name: Android

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag / branch / SHA to build (empty = current ref)"
        required: false
        type: string
        default: ""
      abi_arm64:
        description: "arm64-v8a (aarch64-linux-android)"
        required: false
        type: boolean
        default: true
      abi_arm:
        description: "armeabi-v7a (armv7-linux-androideabi)"
        required: false
        type: boolean
        default: false
      abi_x86_64:
        description: "x86_64 (x86_64-linux-android)"
        required: false
        type: boolean
        default: false
      abi_x86:
        description: "x86 (i686-linux-android)"
        required: false
        type: boolean
        default: false
      api_level:
        description: "Android NDK API level"
        required: false
        type: string
        default: "28"
  push:
    tags:
      - 'v*'

concurrency:
  group: android-${{ github.ref }}-${{ github.event_name }}-${{ inputs.tag || 'default' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Resolve which ABIs to build into a JSON matrix for the build job.
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      ref: ${{ steps.set.outputs.ref }}
    steps:
      - id: set
        shell: bash
        run: |
          set -euo pipefail

          # Tag/branch/SHA from manual input, or the ref that triggered the run.
          # Normalize refs/tags/X and refs/heads/X to the short name checkout accepts.
          REF="${{ github.event.inputs.tag }}"
          if [[ -z "$REF" ]]; then
            REF="${{ github.ref }}"
          fi
          REF="${REF#refs/tags/}"
          REF="${REF#refs/heads/}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Building ref: $REF"

          # Collect selected ABIs. For tag pushes, default to arm64 only.
          INCLUDE_JSON=""
          append_abi() {
            local target="$1" abi="$2"
            if [[ -n "$INCLUDE_JSON" ]]; then
              INCLUDE_JSON+=","
            fi
            INCLUDE_JSON+="{\"target\":\"${target}\",\"abi\":\"${abi}\"}"
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            [[ "${{ inputs.abi_arm64 }}" == "true" ]] && append_abi "aarch64-linux-android" "arm64-v8a"
            [[ "${{ inputs.abi_arm }}" == "true" ]] && append_abi "armv7-linux-androideabi" "armeabi-v7a"
            [[ "${{ inputs.abi_x86_64 }}" == "true" ]] && append_abi "x86_64-linux-android" "x86_64"
            [[ "${{ inputs.abi_x86 }}" == "true" ]] && append_abi "i686-linux-android" "x86"
          else
            append_abi "aarch64-linux-android" "arm64-v8a"
          fi

          if [[ -z "$INCLUDE_JSON" ]]; then
            echo "No ABI selected" >&2
            exit 1
          fi

          MATRIX="{\"include\":[${INCLUDE_JSON}]}"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  build:
    name: ${{ matrix.abi }}
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    env:
      CARGO_TERM_COLOR: always
      CARGO_BUILD_JOBS: "2"
      NINJAFLAGS: "-j2"
      ANDROID_API_LEVEL: ${{ inputs.api_level || '28' }}
      ANDROID_TARGET: ${{ matrix.target }}
      CARGO_TARGET_DIR: ${{ github.workspace }}/target

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Manual runs can pin a tag/branch/SHA; tag-push uses the push ref.
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Show checkout
        run: |
          echo "ref=${{ needs.prepare.outputs.ref }}"
          echo "head=$(git rev-parse --short HEAD)"
          echo "describe=$(git describe --tags --always --dirty 2>/dev/null || true)"
          echo "target=${{ matrix.target }} abi=${{ matrix.abi }}"

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker system prune -af || true
          df -h

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config libglib2.0-dev \
            curl ca-certificates unzip python3 git

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d
          add-to-path: false
          link-to-sdk: false

      - name: Install gn (CIPD revision pinned by rusty_v8 DEPS)
        run: |
          set -euo pipefail
          # Keep in sync with v8-137.x DEPS gn_version when bumping deno_core/v8.
          GN_VERSION='git_revision:90478db6b59b9bebf7ca4cf912d860cf868e724c'
          INSTANCE=$(curl -fsSL \
            "https://chrome-infra-packages.appspot.com/_ah/api/repo/v1/instance/resolve?package_name=gn/gn/linux-amd64&version=${GN_VERSION}" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["instance_id"])')
          URL=$(curl -fsSL \
            "https://chrome-infra-packages.appspot.com/_ah/api/repo/v1/instance?package_name=gn/gn/linux-amd64&instance_id=${INSTANCE}" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["fetch_url"])')
          curl -fsSL -o /tmp/gn.zip "$URL"
          sudo unzip -o /tmp/gn.zip -d /usr/local/bin
          sudo chmod +x /usr/local/bin/gn
          gn --version
          ninja --version

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Cache V8 android build
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/gn_out
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/clang
            ${{ env.CARGO_TARGET_DIR }}/release/build
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/build
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/deps
            ${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release/.fingerprint
          key: ${{ runner.os }}-v8-android-137-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-v8-android-137-${{ matrix.target }}-

      - name: Ensure build scripts
        # Checked-out source may be an older tag that predates the Android
        # build scripts. Pull them from the commit that owns this workflow
        # (github.sha = the branch selected in "Run workflow").
        run: |
          set -euo pipefail
          mkdir -p scripts
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          fetch_if_missing() {
            local path="$1"
            if [[ -f "$path" ]]; then
              echo "present: $path"
              return 0
            fi
            echo "missing $path — fetching from ${REPO}@${SHA}"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${SHA}/${path}" -o "$path"
          }
          fetch_if_missing scripts/build-android.sh
          fetch_if_missing scripts/build-android-arm64.sh || true
          chmod +x scripts/build-android.sh
          [[ -f scripts/build-android-arm64.sh ]] && chmod +x scripts/build-android-arm64.sh
          ls -la scripts/

      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          if [[ -f scripts/build-android.sh ]]; then
            bash scripts/build-android.sh
          elif [[ -f scripts/build-android-arm64.sh ]]; then
            bash scripts/build-android-arm64.sh
          else
            echo "No android build script available (not in source tree, and not on ${{ github.sha }})" >&2
            exit 1
          fi

      - name: Package
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          OUT="target/${{ matrix.target }}/release"
          STRIP="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          "$STRIP" "$OUT/obscura" "$OUT/obscura-worker" || true
          ARTIFACT="obscura-${{ matrix.abi }}-android.tar.gz"
          tar czf "$ARTIFACT" -C "$OUT" obscura obscura-worker
          ls -lh "$ARTIFACT"
          file "$OUT/obscura" "$OUT/obscura-worker"
          echo "artifact=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obscura-${{ matrix.abi }}-android
          path: obscura-${{ matrix.abi }}-android.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Attach to release
        # Only when building a tag (manual tag input or tag push).
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && startsWith(needs.prepare.outputs.ref, 'v'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.ref }}
          files: obscura-${{ matrix.abi }}-android.tar.gz
          fail_on_unmatched_files: true